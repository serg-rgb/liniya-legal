<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Линия — Юридические документы</title>
<style>
  :root { --bg: #f8f9fc; --card: #fff; --text: #1a1a2e; --muted: #6b7280; --accent: #00b85c; --border: #e5e7eb; }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0a0a14; --card: #161622; --text: #e0e0e0; --muted: #9ca3af; --border: #2a2a3a; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .wrap { max-width: 520px; width: 100%; background: var(--card); border-radius: 20px; padding: 48px 40px; border: 1px solid var(--border); box-shadow: 0 4px 40px rgba(0,0,0,0.06); text-align: center; }
  .logo { font-size: 64px; margin-bottom: 16px; }
  h1 { font-size: 36px; font-weight: 800; margin-bottom: 8px; letter-spacing: 2px; color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 40px; }
  .link { display: block; padding: 20px 24px; background: transparent; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; text-decoration: none; color: var(--text); transition: all 0.2s; }
  .link:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,184,92,0.1); }
  .link-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  .link-desc { color: var(--muted); font-size: 13px; }
  .footer { margin-top: 32px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">⚽</div>
  <h1>ЛИНИЯ</h1>
  <div class="subtitle">Футбольная статистика · Юридические документы</div>

  <a class="link" href="privacy-policy.html">
    <div class="link-title">📋 Политика конфиденциальности</div>
    <div class="link-desc">Какие данные собирает приложение и как они обрабатываются</div>
  </a>

  <a class="link" href="terms-of-use.html">
    <div class="link-title">📜 Пользовательское соглашение</div>
    <div class="link-desc">Условия использования приложения, дисклеймеры, возрастные ограничения</div>
  </a>

  <div class="footer">Контакт: hupernova@gmail.com</div>
</div>
</body>
</html>
